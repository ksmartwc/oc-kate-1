<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Animated Dot Cube</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { background: #07071a; display: flex; align-items: center; justify-content: center; min-height: 100vh; }
    canvas { display: block; }
  </style>
</head>
<body>
<canvas id="c" width="700" height="700"></canvas>
<script>
const canvas = document.getElementById('c');
const ctx = canvas.getContext('2d');
const W = canvas.width, H = canvas.height;
const cx = W/2, cy = H/2;

const S = 190;    // half cube size
const GRID = 6;   // dots per edge
const DOT_R = 11; // uniform base radius
const FOV = 1100; // high FOV = less perspective distortion = flatter faces

function dot3(a,b){return a[0]*b[0]+a[1]*b[1]+a[2]*b[2];}
function norm(v){const l=Math.sqrt(dot3(v,v));return l<1e-6?v:v.map(x=>x/l);}

// 6 cube faces [origin, u-step, v-step, face-normal]
const faceDefs = [
  { o:[-S,-S, S], u:[2*S,0,0], v:[0,2*S,0], n:[0,0, 1] },
  { o:[ S,-S,-S], u:[-2*S,0,0], v:[0,2*S,0], n:[0,0,-1] },
  { o:[-S,-S,-S], u:[0,0,2*S], v:[0,2*S,0], n:[-1,0,0] },
  { o:[ S,-S, S], u:[0,0,-2*S], v:[0,2*S,0], n:[1,0, 0] },
  { o:[-S,-S,-S], u:[2*S,0,0], v:[0,0,2*S], n:[0,-1,0] },
  { o:[-S, S, S], u:[2*S,0,0], v:[0,0,-2*S], n:[0, 1,0] },
];

const allDots = [];
faceDefs.forEach(face => {
  for (let i = 0; i < GRID; i++) {
    for (let j = 0; j < GRID; j++) {
      const ti = i/(GRID-1), tj = j/(GRID-1);
      allDots.push({
        pos: [
          face.o[0]+face.u[0]*ti+face.v[0]*tj,
          face.o[1]+face.u[1]*ti+face.v[1]*tj,
          face.o[2]+face.u[2]*ti+face.v[2]*tj,
        ],
        faceN: [...face.n]
      });
    }
  }
});

function rotX(p,a){const[x,y,z]=p,c=Math.cos(a),s=Math.sin(a);return[x,y*c-z*s,y*s+z*c];}
function rotY(p,a){const[x,y,z]=p,c=Math.cos(a),s=Math.sin(a);return[x*c+z*s,y,-x*s+z*c];}

function drawSphere(sx, sy, r, bright){
  if(r < 0.5) return;
  const g = ctx.createRadialGradient(sx-r*.35, sy-r*.38, r*.04, sx, sy, r);
  g.addColorStop(0,  `rgba(235,215,255,${bright})`);
  g.addColorStop(.3, `rgba(155,85,248,${bright})`);
  g.addColorStop(.7, `rgba(85,25,178,${bright})`);
  g.addColorStop(1,  `rgba(18,4,55,${bright})`);
  ctx.beginPath(); ctx.arc(sx, sy, r, 0, Math.PI*2);
  ctx.fillStyle = g; ctx.fill();
  const h = ctx.createRadialGradient(sx-r*.3, sy-r*.38, 0, sx-r*.3, sy-r*.38, r*.48);
  h.addColorStop(0,  `rgba(255,255,255,${bright*.75})`);
  h.addColorStop(.5, `rgba(255,255,255,${bright*.14})`);
  h.addColorStop(1,  'rgba(255,255,255,0)');
  ctx.beginPath(); ctx.arc(sx, sy, r, 0, Math.PI*2);
  ctx.fillStyle = h; ctx.fill();
}

let angleX = 0.42, angleY = 0.62, floatT = 0;
const light = norm([-0.35, -0.75, 0.65]);

function render(){
  ctx.clearRect(0, 0, W, H);
  angleY += 0.008;
  angleX += 0.002;
  floatT += 0.018;
  const fy = Math.sin(floatT * 0.6) * 15;

  const visible = new Map();

  allDots.forEach(d => {
    let n = [...d.faceN];
    n = rotX(n, angleX); n = rotY(n, angleY);
    if (n[2] <= 0.02) return; // hard backface cull

    let p = [d.pos[0], d.pos[1]+fy, d.pos[2]];
    p = rotX(p, angleX); p = rotY(p, angleY);

    const scale = FOV / (FOV + p[2] + 400);
    const sx = cx + p[0] * scale;
    const sy = cy + p[1] * scale;

    // Uniform dot size — just slight perspective scale for depth realism
    const r = DOT_R * scale;

    const diff = Math.max(0, dot3(n, light));
    const bright = 0.45 + diff * 0.55;

    const key = d.pos.map(x=>Math.round(x)).join(',');
    if (!visible.has(key) || p[2] > visible.get(key).pz) {
      visible.set(key, { sx, sy, z: p[2], r, bright, pz: p[2] });
    }
  });

  [...visible.values()]
    .sort((a,b) => a.z - b.z)
    .forEach(d => drawSphere(d.sx, d.sy, d.r, d.bright));

  requestAnimationFrame(render);
}
render();
</script>
</body>
</html>

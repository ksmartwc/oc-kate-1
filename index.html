<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Dot Cube</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { background: #060d28; display: flex; align-items: center; justify-content: center; min-height: 100vh; }
    canvas { display: block; }
  </style>
</head>
<body>
<canvas id="c" width="800" height="800"></canvas>
<script>
const canvas = document.getElementById('c');
const ctx    = canvas.getContext('2d');
const W = canvas.width, H = canvas.height;

// ── Isometric grid ─────────────────────────────────────
const N = 8, C = 27;
const PHI = 0.12; // ~7° left rotation
const R = [(Math.cos(PHI)-Math.sin(PHI))*Math.sqrt(3)/2*C, (Math.cos(PHI)+Math.sin(PHI))*C/2];
const L = [-(Math.sin(PHI)+Math.cos(PHI))*Math.sqrt(3)/2*C, (Math.cos(PHI)-Math.sin(PHI))*C/2];

const cubeH   = 2*(N-1)*C;
const originY = H/2 - cubeH/2;
const originX = W/2;

const origin      = [originX, originY];
const rightOrigin = [originX+(N-1)*R[0], originY+(N-1)*R[1]];
const leftOrigin  = [originX+(N-1)*L[0], originY+(N-1)*L[1]];

// ── Key points ────────────────────────────────────────
const CENTER    = [originX,        originY+(N-1)*C];  // 3-face meeting point
const TOP       = [originX,        originY];
const TOP_RIGHT = [rightOrigin[0], rightOrigin[1]];
const BOT_RIGHT = [rightOrigin[0], rightOrigin[1]+(N-1)*C];
const BOT_FRONT = [originX,        originY+2*(N-1)*C];
const BOT_LEFT  = [leftOrigin[0],  leftOrigin[1]+(N-1)*C];
const TOP_LEFT  = [leftOrigin[0],  leftOrigin[1]];

// Path: center → all 6 corners in order → back to center
const PATH = [CENTER, TOP, TOP_RIGHT, BOT_RIGHT, BOT_FRONT, BOT_LEFT, CENTER]; // CW, no left side
const CYCLE_MS = 11000; // slower

// ── Build all dots ─────────────────────────────────────
function topFaceDot(i,j)   { return [origin[0]+i*R[0]+j*L[0],     origin[1]+i*R[1]+j*L[1]]; }
function rightFaceDot(j,k) { return [rightOrigin[0]+j*L[0],        rightOrigin[1]+j*L[1]+k*C]; }
function leftFaceDot(i,k)  { return [leftOrigin[0]+i*R[0],         leftOrigin[1]+i*R[1]+k*C]; }

const allDots = [], seen = new Set();
function addDot(sx,sy,face,depth){
  const key=`${Math.round(sx)},${Math.round(sy)}`;
  if(seen.has(key))return; seen.add(key);
  allDots.push({sx,sy,face,depth});
}
for(let i=0;i<N;i++) for(let j=0;j<N;j++){ const[sx,sy]=topFaceDot(i,j);   addDot(sx,sy,'top',i+j); }
for(let j=0;j<N;j++) for(let k=0;k<N;k++){ const[sx,sy]=rightFaceDot(j,k); addDot(sx,sy,'right',(N-1-j)+k+(N-1)); }
for(let i=0;i<N;i++) for(let k=0;k<N;k++){ const[sx,sy]=leftFaceDot(i,k);  addDot(sx,sy,'left',(N-1-i)+k+(N-1)); }
allDots.sort((a,b)=>a.depth-b.depth);

// ── Dot sizing ────────────────────────────────────────
const DOT_R = 3.5;  // uniform dot radius — no size-based bubbles
const SIGMA = (N-1)*Math.sqrt(3)/2*C*0.65; // wider cluster area

function glowFactor(sx,sy,cx,cy){
  const d=Math.hypot(sx-cx,sy-cy);
  return Math.exp(-(d*d)/(2*SIGMA*SIGMA));
}

// Face shading for 3D depth
const BRIGHT={top:1.0, left:0.60, right:0.38};

function drawDot(sx,sy,r,face,glow){
  const b = BRIGHT[face] * (0.64 + 0.36 * glow); // small dots darker
  const w = glow; // 0=small/blue  1=big/green-center

  // Small dots (glow=0): pure blue
  // Big dots (glow=1): white center highlight, purple mid ring, blue outer
  const cR0 = Math.round(55  + w * (255 - 55));   // blue→white center
  const cG0 = Math.round(120 + w * (255 - 120));
  const cB0 = 255;

  // mid ring: blue → purple (high red, low green, high blue)
  const cR1 = Math.round(40  + w * (150 - 40));   // 40→150 (red boost = purple)
  const cG1 = Math.round(100 + w * (20  - 100));  // 100→20  (drop green = purple)
  const cB1 = Math.round(210 + w * (210 - 210));  // 210 stays

  const g = ctx.createRadialGradient(sx-r*.32, sy-r*.36, r*.04, sx, sy, r);
  g.addColorStop(0,    `rgba(${cR0},${cG0},${cB0},${b})`);    // white (peak) or blue
  g.addColorStop(0.4,  `rgba(${cR1},${cG1},${cB1},${b})`);    // purple mid
  g.addColorStop(0.75, `rgba(40,90,200,${b})`);                // blue outer
  g.addColorStop(1,    `rgba(12,28,90,${b})`);                 // dark blue edge
  ctx.beginPath();ctx.arc(sx,sy,r,0,Math.PI*2);ctx.fillStyle=g;ctx.fill();

  // White specular highlight (light reflection spot, upper-left)
  const h = ctx.createRadialGradient(sx-r*.28,sy-r*.34,0,sx-r*.28,sy-r*.34,r*.44);
  h.addColorStop(0,  `rgba(255,255,255,${b*.80})`);
  h.addColorStop(.3, `rgba(255,255,255,${b*.12})`);
  h.addColorStop(1,  'rgba(255,255,255,0)');
  ctx.beginPath();ctx.arc(sx,sy,r,0,Math.PI*2);ctx.fillStyle=h;ctx.fill();
}

function smoothstep(t){ return t*t*(3-2*t); }

function getCenter(elapsed){
  const segs = PATH.length - 1;
  const pos  = (elapsed / CYCLE_MS) * segs;
  const seg  = Math.min(segs-1, Math.floor(pos));
  const t    = pos - seg; // linear = constant speed
  const a = PATH[seg], b = PATH[seg+1];
  return [a[0]+(b[0]-a[0])*t, a[1]+(b[1]-a[1])*t];
}

// Cube visual center for background glow
const cubeCenterX = originX;
const cubeCenterY = originY + (N-1)*C;  // 3-face meeting point

// Floor Y: where shadows land (below cube bottom)
const floorY = originY + 2*(N-1)*C + C * 2.0;

function drawBackground(){
  ctx.fillStyle = '#060d28';
  ctx.fillRect(0,0,W,H);

  // Horizontal ellipse gradient (uniform, lighter, no dark center)
  const glowY  = cubeCenterY + cubeH * 0.4;   // moved up 10%
  const rBase  = cubeH * 0.525;               // 30% smaller (was 0.75)
  ctx.save();
  ctx.translate(cubeCenterX, glowY);
  ctx.scale(2.8, 1.0);   // wide horizontal ellipse
  const glow = ctx.createRadialGradient(0, 0, 0, 0, 0, rBase);
  glow.addColorStop(0,    'rgba(25, 60, 160, 0.55)');  // lighter uniform center
  glow.addColorStop(0.4,  'rgba(20, 50, 140, 0.45)');
  glow.addColorStop(0.7,  'rgba(12, 30,  95, 0.25)');
  glow.addColorStop(0.9,  'rgba(6,  15,  55, 0.10)');
  glow.addColorStop(1,    'rgba(0,   0,   0, 0)');
  ctx.fillStyle = glow;
  ctx.fillRect(-W, -H*2, W*2, H*4);
  ctx.restore();
}

function drawFloorShadows(cx, cy){
  for(const d of allDots){
    const r = dotRadius(d.sx, d.sy, cx, cy);
    const distToFloor = floorY - d.sy;
    const spreadT = Math.min(1, distToFloor / (cubeH * 1.2));
    const shadowRx = r * (0.8 + spreadT * 1.0);
    const shadowRy = shadowRx * 0.28;
    const alpha    = 0.22 * (r / R_MAX) * (0.4 + (1 - spreadT) * 0.6);
    if(alpha < 0.01) continue;
    // Slight outward x spread based on distance from center
    const spreadX = (d.sx - cubeCenterX) * 0.06;
    ctx.beginPath();
    ctx.ellipse(d.sx + spreadX, floorY, shadowRx, shadowRy, 0, 0, Math.PI*2);
    ctx.fillStyle = `rgba(0,0,0,${alpha})`;
    ctx.fill();
  }
}

// ── Mouse tracking ────────────────────────────────────
let mouseX = null, mouseY = null;
canvas.addEventListener('mousemove', e => {
  const rect = canvas.getBoundingClientRect();
  mouseX = (e.clientX - rect.left) * (W / rect.width);
  mouseY = (e.clientY - rect.top)  * (H / rect.height);
});
canvas.addEventListener('mouseleave', () => { mouseX = null; mouseY = null; });

let start = null;
function render(ts){
  if(!start) start = ts;
  const [cx,cy] = (mouseX !== null)
    ? [mouseX, mouseY]
    : getCenter((ts-start) % CYCLE_MS);
  drawBackground();
  for(const d of allDots){
    const glow = glowFactor(d.sx,d.sy,cx,cy);
    const r = DOT_R + 10.7 * glow; // size boost (3.5→14.2px, +10% on big dots)
    drawDot(d.sx,d.sy,r,d.face,glow);
  }
  requestAnimationFrame(render);
}
requestAnimationFrame(render);
</script>
</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Dot Cube</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { background: #060d28; display: flex; align-items: center; justify-content: center; min-height: 100vh; }
    canvas { display: block; }
  </style>
</head>
<body>
<canvas id="c" width="800" height="800"></canvas>
<script>
const canvas = document.getElementById('c');
const ctx    = canvas.getContext('2d');
const W = canvas.width, H = canvas.height;

// ── Isometric grid ─────────────────────────────────────
const N = 8, C = 22;
const R = [ Math.sqrt(3)/2*C,  C/2 ];
const L = [-Math.sqrt(3)/2*C,  C/2 ];

const cubeH   = 2*(N-1)*C;
const originY = H/2 - cubeH/2;
const originX = W/2;

const origin      = [originX, originY];
const rightOrigin = [originX+(N-1)*R[0], originY+(N-1)*R[1]];
const leftOrigin  = [originX+(N-1)*L[0], originY+(N-1)*L[1]];

// ── Key points ────────────────────────────────────────
const CENTER    = [originX,        originY+(N-1)*C];  // 3-face meeting point
const TOP       = [originX,        originY];
const TOP_RIGHT = [rightOrigin[0], rightOrigin[1]];
const BOT_RIGHT = [rightOrigin[0], rightOrigin[1]+(N-1)*C];
const BOT_FRONT = [originX,        originY+2*(N-1)*C];
const BOT_LEFT  = [leftOrigin[0],  leftOrigin[1]+(N-1)*C];
const TOP_LEFT  = [leftOrigin[0],  leftOrigin[1]];

// Path: center → all 6 corners in order → back to center
const PATH = [CENTER, TOP, TOP_LEFT, BOT_LEFT, BOT_FRONT, BOT_RIGHT, TOP_RIGHT, CENTER]; // CCW
const CYCLE_MS = 11000; // slower

// ── Build all dots ─────────────────────────────────────
function topFaceDot(i,j)   { return [origin[0]+i*R[0]+j*L[0],     origin[1]+i*R[1]+j*L[1]]; }
function rightFaceDot(j,k) { return [rightOrigin[0]+j*L[0],        rightOrigin[1]+j*L[1]+k*C]; }
function leftFaceDot(i,k)  { return [leftOrigin[0]+i*R[0],         leftOrigin[1]+i*R[1]+k*C]; }

const allDots = [], seen = new Set();
function addDot(sx,sy,face,depth){
  const key=`${Math.round(sx)},${Math.round(sy)}`;
  if(seen.has(key))return; seen.add(key);
  allDots.push({sx,sy,face,depth});
}
for(let i=0;i<N;i++) for(let j=0;j<N;j++){ const[sx,sy]=topFaceDot(i,j);   addDot(sx,sy,'top',i+j); }
for(let j=0;j<N;j++) for(let k=0;k<N;k++){ const[sx,sy]=rightFaceDot(j,k); addDot(sx,sy,'right',(N-1-j)+k+(N-1)); }
for(let i=0;i<N;i++) for(let k=0;k<N;k++){ const[sx,sy]=leftFaceDot(i,k);  addDot(sx,sy,'left',(N-1-i)+k+(N-1)); }
allDots.sort((a,b)=>a.depth-b.depth);

// ── Dot sizing ────────────────────────────────────────
const R_MAX=12, R_MIN=2.5;
const SIGMA=(N-1)*Math.sqrt(3)/2*C*0.42;

function dotRadius(sx,sy,cx,cy){
  const d=Math.hypot(sx-cx,sy-cy);
  return R_MIN+(R_MAX-R_MIN)*Math.exp(-(d*d)/(2*SIGMA*SIGMA));
}

// Stronger face shading for 3D depth
const BRIGHT={top:1.0, left:0.60, right:0.38};

function drawDot(sx,sy,r,face){
  if(r<0.5)return;
  const b=BRIGHT[face];
  const warmT=Math.max(0,Math.min(1,(r-R_MIN)/(R_MAX-R_MIN)));
  // Base color: small dots are clearly visible lighter blue; big dots are bright
  const fr=Math.round(55+warmT*65), fg=Math.round(120+warmT*80), fb=255;
  const g=ctx.createRadialGradient(sx-r*.32,sy-r*.36,r*.04,sx,sy,r);
  g.addColorStop(0,   `rgba(${Math.min(255,fr+100)},${Math.min(255,fg+50)},${fb},${b})`);
  g.addColorStop(0.35,`rgba(${fr+40},${fg+15},${fb},${b})`);
  g.addColorStop(0.7, `rgba(${fr},${fg},${fb},${b})`);
  g.addColorStop(1,   `rgba(${Math.round(fr*.3)},${Math.round(fg*.3)},${Math.round(fb*.45)},${b})`);
  ctx.beginPath();ctx.arc(sx,sy,r,0,Math.PI*2);ctx.fillStyle=g;ctx.fill();
  const h=ctx.createRadialGradient(sx-r*.28,sy-r*.34,0,sx-r*.28,sy-r*.34,r*.46);
  h.addColorStop(0,  `rgba(255,255,255,${b*.72})`);
  h.addColorStop(.4, `rgba(255,255,255,${b*.1})`);
  h.addColorStop(1,  'rgba(255,255,255,0)');
  ctx.beginPath();ctx.arc(sx,sy,r,0,Math.PI*2);ctx.fillStyle=h;ctx.fill();
}

function smoothstep(t){ return t*t*(3-2*t); }

function getCenter(elapsed){
  const segs = PATH.length - 1;
  const pos  = (elapsed / CYCLE_MS) * segs;
  const seg  = Math.min(segs-1, Math.floor(pos));
  const t    = pos - seg; // linear = constant speed
  const a = PATH[seg], b = PATH[seg+1];
  return [a[0]+(b[0]-a[0])*t, a[1]+(b[1]-a[1])*t];
}

// Cube visual center for background glow
const cubeCenterX = originX;
const cubeCenterY = originY + (N-1)*C;  // 3-face meeting point

function drawBackground(){
  // Deep background
  ctx.fillStyle = '#060d28';
  ctx.fillRect(0,0,W,H);

  // Soft depth glow behind cube — like a light source
  const bg = ctx.createRadialGradient(cubeCenterX, cubeCenterY, 0, cubeCenterX, cubeCenterY, cubeH*0.72);
  bg.addColorStop(0,   'rgba(12, 30, 80, 0.85)');
  bg.addColorStop(0.45,'rgba(8, 20, 58, 0.6)');
  bg.addColorStop(1,   'rgba(0, 0, 0, 0)');
  ctx.fillStyle = bg;
  ctx.fillRect(0,0,W,H);

  // Subtle shadow/depth plane below cube
  const shadow = ctx.createRadialGradient(cubeCenterX, cubeCenterY+80, 0, cubeCenterX, cubeCenterY+80, 300);
  shadow.addColorStop(0,   'rgba(0,0,0,0.35)');
  shadow.addColorStop(1,   'rgba(0,0,0,0)');
  ctx.fillStyle = shadow;
  ctx.fillRect(0,0,W,H);
}

let start = null;
function render(ts){
  if(!start) start = ts;
  const [cx,cy] = getCenter((ts-start) % CYCLE_MS);
  drawBackground();
  for(const d of allDots) drawDot(d.sx,d.sy,dotRadius(d.sx,d.sy,cx,cy),d.face);
  requestAnimationFrame(render);
}
requestAnimationFrame(render);
</script>
</body>
</html>

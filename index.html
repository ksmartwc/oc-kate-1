<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Animated Dot Cube</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { background: #0a0f2e; display: flex; align-items: center; justify-content: center; min-height: 100vh; }
    canvas { display: block; }
  </style>
</head>
<body>
<canvas id="c" width="800" height="800"></canvas>
<script>
const canvas = document.getElementById('c');
const ctx = canvas.getContext('2d');
const W = canvas.width, H = canvas.height;
const cx = W/2, cy = H/2;

const S = 200;   // half cube size
const GRID = 8;  // dots per edge — more dots like KPMG
const FOV = 420; // low FOV = dramatic perspective depth

function dot3(a,b){return a[0]*b[0]+a[1]*b[1]+a[2]*b[2];}
function norm(v){const l=Math.sqrt(dot3(v,v));return l<1e-6?v:v.map(x=>x/l);}

const faceDefs = [
  { o:[-S,-S, S], u:[2*S,0,0], v:[0,2*S,0], n:[0,0, 1] },
  { o:[ S,-S,-S], u:[-2*S,0,0], v:[0,2*S,0], n:[0,0,-1] },
  { o:[-S,-S,-S], u:[0,0,2*S], v:[0,2*S,0], n:[-1,0,0] },
  { o:[ S,-S, S], u:[0,0,-2*S], v:[0,2*S,0], n:[1,0, 0] },
  { o:[-S,-S,-S], u:[2*S,0,0], v:[0,0,2*S], n:[0,-1,0] },
  { o:[-S, S, S], u:[2*S,0,0], v:[0,0,-2*S], n:[0, 1,0] },
];

const allDots = [];
faceDefs.forEach(face => {
  for (let i = 0; i < GRID; i++) {
    for (let j = 0; j < GRID; j++) {
      const ti = i/(GRID-1), tj = j/(GRID-1);
      allDots.push({
        pos: [
          face.o[0]+face.u[0]*ti+face.v[0]*tj,
          face.o[1]+face.u[1]*ti+face.v[1]*tj,
          face.o[2]+face.u[2]*ti+face.v[2]*tj,
        ],
        faceN: [...face.n]
      });
    }
  }
});

function rotX(p,a){const[x,y,z]=p,c=Math.cos(a),s=Math.sin(a);return[x,y*c-z*s,y*s+z*c];}
function rotY(p,a){const[x,y,z]=p,c=Math.cos(a),s=Math.sin(a);return[x*c+z*s,y,-x*s+z*c];}

function drawSphere(sx, sy, r, bright, isCenter){
  if(r < 0.4) return;

  // Blue palette like KPMG, pink/purple highlight at center
  const hue = isCenter ? 260 : 220; // purple for bright, blue for dark
  
  const g = ctx.createRadialGradient(sx-r*.35, sy-r*.4, r*.03, sx, sy, r);
  if(isCenter){
    g.addColorStop(0,  `rgba(255,200,255,${bright})`);
    g.addColorStop(.2, `rgba(200,120,255,${bright})`);
    g.addColorStop(.5, `rgba(120,60,240,${bright})`);
    g.addColorStop(1,  `rgba(20,10,80,${bright})`);
  } else {
    g.addColorStop(0,  `rgba(160,210,255,${bright})`);
    g.addColorStop(.2, `rgba(60,140,255,${bright})`);
    g.addColorStop(.5, `rgba(20,60,200,${bright})`);
    g.addColorStop(1,  `rgba(5,10,60,${bright})`);
  }
  ctx.beginPath(); ctx.arc(sx, sy, r, 0, Math.PI*2);
  ctx.fillStyle = g; ctx.fill();

  // Specular highlight
  const h = ctx.createRadialGradient(sx-r*.3, sy-r*.38, 0, sx-r*.3, sy-r*.38, r*.5);
  h.addColorStop(0,  `rgba(255,255,255,${bright*.85})`);
  h.addColorStop(.4, `rgba(255,255,255,${bright*.2})`);
  h.addColorStop(1,  'rgba(255,255,255,0)');
  ctx.beginPath(); ctx.arc(sx, sy, r, 0, Math.PI*2);
  ctx.fillStyle = h; ctx.fill();
}

let angleX = 0.42, angleY = 0.62, floatT = 0;
let cubeFloatY = 0;
const light = norm([-0.3, -0.7, 0.65]);

function render(){
  ctx.clearRect(0, 0, W, H);
  angleY += 0.015;
  angleX += 0.004;
  floatT += 0.018;
  cubeFloatY = Math.sin(floatT * 0.6) * 18;

  const visible = new Map();

  allDots.forEach(d => {
    let n = [...d.faceN];
    n = rotX(n, angleX); n = rotY(n, angleY);
    if (n[2] <= 0.02) return;

    let p = [...d.pos];
    p = rotX(p, angleX); p = rotY(p, angleY);

    // Dramatic perspective: closer = much bigger
    const camZ = p[2] + S*1.8;
    const scale = FOV / (FOV + camZ);
    const sx = cx + p[0] * scale;
    const sy = cy + cubeFloatY + p[1] * scale;

    // Depth-based radius — dramatic like KPMG
    const depthT = Math.max(0, Math.min(1, 1 - camZ / (S*3.5)));
    const r = 2.5 + depthT * 20; // tiny at back, large at front

    const diff = Math.max(0, dot3(n, light));
    const bright = 0.4 + diff * 0.6;
    const isCenter = depthT > 0.55; // purple/pink for closest dots

    const key = d.pos.map(x=>Math.round(x)).join(',');
    if (!visible.has(key) || p[2] > visible.get(key).pz) {
      visible.set(key, { sx, sy, z: p[2], r, bright, isCenter, pz: p[2] });
    }
  });

  [...visible.values()]
    .sort((a,b) => a.z - b.z)
    .forEach(d => drawSphere(d.sx, d.sy, d.r, d.bright, d.isCenter));

  requestAnimationFrame(render);
}
render();
</script>
</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Animated Dot Cube</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { background: #07071a; display: flex; align-items: center; justify-content: center; min-height: 100vh; }
    canvas { display: block; }
  </style>
</head>
<body>
<canvas id="c" width="700" height="700"></canvas>
<script>
const canvas = document.getElementById('c');
const ctx = canvas.getContext('2d');
const W = canvas.width, H = canvas.height;
const cx = W/2, cy = H/2;

const S = 180;   // half cube size
const GRID = 6;  // dots per edge
const FOV = 900;

// Depth-based size: front dot radius vs back dot radius
const DOT_R_FRONT = 16;
const DOT_R_BACK  = 8;

function dot(a,b){return a[0]*b[0]+a[1]*b[1]+a[2]*b[2];}
function norm(v){const l=Math.sqrt(dot(v,v));return l<1e-6?v:v.map(x=>x/l);}
function lerp(a,b,t){return a.map((x,i)=>x+(b[i]-x)*t);}

// 6 cube faces
const faceDefs = [
  { o:[-S,-S, S], u:[2*S,0,0], v:[0,2*S,0], n:[0,0, 1] }, // front
  { o:[ S,-S,-S], u:[-2*S,0,0], v:[0,2*S,0], n:[0,0,-1] }, // back
  { o:[-S,-S,-S], u:[0,0,2*S], v:[0,2*S,0], n:[-1,0,0] }, // left
  { o:[ S,-S, S], u:[0,0,-2*S], v:[0,2*S,0], n:[1,0, 0] }, // right
  { o:[-S,-S,-S], u:[2*S,0,0], v:[0,0,2*S], n:[0,-1,0] }, // top
  { o:[-S, S, S], u:[2*S,0,0], v:[0,0,-2*S], n:[0, 1,0] }, // bottom
];

// Generate all face dots (keep edge dots per-face, dedupe for rendering)
const allDots = [];
faceDefs.forEach(face => {
  for (let i = 0; i < GRID; i++) {
    for (let j = 0; j < GRID; j++) {
      const ti = i/(GRID-1), tj = j/(GRID-1);
      allDots.push({
        pos: [
          face.o[0]+face.u[0]*ti+face.v[0]*tj,
          face.o[1]+face.u[1]*ti+face.v[1]*tj,
          face.o[2]+face.u[2]*ti+face.v[2]*tj,
        ],
        faceN: [...face.n]
      });
    }
  }
});

function rotX(p,a){const[x,y,z]=p,c=Math.cos(a),s=Math.sin(a);return[x,y*c-z*s,y*s+z*c];}
function rotY(p,a){const[x,y,z]=p,c=Math.cos(a),s=Math.sin(a);return[x*c+z*s,y,-x*s+z*c];}

function drawSphere(sx, sy, r, bright){
  if(r < 0.5) return;
  const g = ctx.createRadialGradient(sx-r*.35, sy-r*.38, r*.04, sx, sy, r);
  g.addColorStop(0,  `rgba(235,215,255,${bright})`);
  g.addColorStop(.3, `rgba(158,88,248,${bright})`);
  g.addColorStop(.7, `rgba(88,28,180,${bright})`);
  g.addColorStop(1,  `rgba(18,4,55,${bright})`);
  ctx.beginPath(); ctx.arc(sx, sy, r, 0, Math.PI*2);
  ctx.fillStyle = g; ctx.fill();
  // specular
  const h = ctx.createRadialGradient(sx-r*.3, sy-r*.38, 0, sx-r*.3, sy-r*.38, r*.48);
  h.addColorStop(0,  `rgba(255,255,255,${bright*.78})`);
  h.addColorStop(.5, `rgba(255,255,255,${bright*.15})`);
  h.addColorStop(1,  'rgba(255,255,255,0)');
  ctx.beginPath(); ctx.arc(sx, sy, r, 0, Math.PI*2);
  ctx.fillStyle = h; ctx.fill();
}

let angleX = 0.4, angleY = 0.6, floatT = 0;
const light = norm([-0.35, -0.75, 0.65]);

function render(){
  ctx.clearRect(0, 0, W, H);
  angleY += 0.009;
  angleX += 0.0025;
  floatT += 0.018;
  const fy = Math.sin(floatT * 0.6) * 16;

  // Collect visible dots — hard culling per face normal
  const visible = new Map(); // key → best dot (closest face)
  
  allDots.forEach(d => {
    let n = [...d.faceN];
    n = rotX(n, angleX); n = rotY(n, angleY);
    if (n[2] <= 0) return; // hard cull back faces

    let p = [d.pos[0], d.pos[1]+fy, d.pos[2]];
    p = rotX(p, angleX); p = rotY(p, angleY);

    const scale = FOV/(FOV + p[2] + 400);
    const sx = cx + p[0]*scale;
    const sy = cy + p[1]*scale;

    // Depth-based radius: map p[2] range to DOT_R
    // p[2] ranges roughly from -S to +S after rotation
    const depthT = Math.max(0, Math.min(1, (p[2] + S*1.5) / (S*3)));
    const r = DOT_R_BACK + (DOT_R_FRONT - DOT_R_BACK) * depthT;

    const diff = Math.max(0, dot(n, light));
    const bright = 0.5 + diff * 0.5;

    const key = d.pos.map(x=>Math.round(x)).join(',');
    if (!visible.has(key) || p[2] > visible.get(key).pz) {
      visible.set(key, { sx, sy, z: p[2], r, bright, pz: p[2] });
    }
  });

  // Sort back to front, draw
  const drawList = [...visible.values()].sort((a,b) => a.z - b.z);
  for (const d of drawList) drawSphere(d.sx, d.sy, d.r, d.bright);

  requestAnimationFrame(render);
}
render();
</script>
</body>
</html>
